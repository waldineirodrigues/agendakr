<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Espaço KR – Agenda</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --gold: #c8a96e;
      --gold-dark: #a07840;
      --bg: #111827;
      --card: #1f2937;
      --card2: #111827;
      --border: #374151;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --danger: #dc2626;
      --green: #4ade80;
    }

    html, body { height: 100%; font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overscroll-behavior: none; }

    #loginScreen {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }

    .login-box {
      background: var(--card); border-radius: 20px;
      padding: 36px 28px; width: 90%; max-width: 360px;
      text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .login-logo {
      width: 140px; height: auto; margin-bottom: 16px;
      filter: drop-shadow(0 2px 8px rgba(200,169,110,0.3));
    }

    .login-box h2 { color: var(--gold); font-size: 1.1rem; margin-bottom: 4px; }
    .login-box p { color: var(--muted); font-size: 0.82rem; margin-bottom: 24px; }

    .login-box input {
      width: 100%; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 12px;
      color: var(--text); padding: 14px 16px; font-size: 1rem;
      outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 4px;
    }

    .login-box input:focus { border-color: var(--gold); }
    .login-error { color: var(--danger); font-size: 0.82rem; margin-bottom: 10px; min-height: 18px; }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: none; border-radius: 12px;
      color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      padding: 10px 20px; display: none;
      align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .header-logo {
      height: 42px; width: auto;
      filter: brightness(0) invert(1);
    }

    .header-text h1 { font-size: 1.1rem; color: #fff; }
    .header-text p  { font-size: 0.7rem; color: rgba(255,255,255,0.85); margin-top: 1px; }
